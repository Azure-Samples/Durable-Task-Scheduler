# Dependabot configuration file
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # .NET (NuGet)
  - package-ecosystem: "nuget"
    directories:
      - "/samples/durable-task-sdks/dotnet/**"
      - "/samples/durable-functions/dotnet/**"
      - "/samples/scenarios/**"
    schedule:
      interval: "monthly"
    groups:
      nuget-all:
        patterns: ["*"]
        update-types: ["patch", "minor", "major"]

  # Java (Maven)
  - package-ecosystem: "maven"
    directories:
      - "/samples/durable-functions/java/**"
    schedule:
      interval: "monthly"
    groups:
      maven-all:
        patterns: ["*"]
        update-types: ["patch", "minor", "major"]

  # Java (Gradle)
  - package-ecosystem: "gradle"
    directories:
      - "/samples/durable-task-sdks/java/**"
    schedule:
      interval: "monthly"
    groups:
      gradle-all:
        patterns: ["*"]
        update-types: ["patch", "minor", "major"]

  # Python (pip)
  - package-ecosystem: "pip"
    directories:
      - "/samples/durable-task-sdks/python/**"
      - "/samples/durable-functions/python/**"
    schedule:
      interval: "monthly"
    groups:
      pip-all:
        patterns: ["*"]
        update-types: ["patch", "minor", "major"]

  # JavaScript (npm)
  - package-ecosystem: "npm"
    directories:
      - "/samples/durable-functions/javascript/**"
      - "/samples/durable-functions/dotnet/AiAgentTravelPlanOrchestrator/Frontend"
    schedule:
      interval: "monthly"
    groups:
      npm-all:
        patterns: ["*"]
        update-types: ["patch", "minor", "major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions-all:
        patterns: ["*"]
        update-types: ["patch", "minor", "major"]

  # Docker
  - package-ecosystem: "docker"
    directories:
      - "/samples/scenarios/AutoscalingInACA/**"
      - "/samples/durable-functions/dotnet/HelloCities/.devcontainer"
      - "/samples/durable-task-sdks/java/function-chaining"
      - "/samples/durable-task-sdks/dotnet/FunctionChaining/**"
    schedule:
      interval: "monthly"
    groups:
      docker-all:
        patterns: ["*"]
        update-types: ["patch", "minor", "major"]
