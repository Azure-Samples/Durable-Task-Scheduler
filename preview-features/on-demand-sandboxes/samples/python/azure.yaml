# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# On-demand Sandboxes (Python) on Azure Container Apps.
#
# Only the orchestrator (main_app.py) is deployed to Azure Container Apps. azd builds its
# image from Containerfile.mainapp via a remote ACR build (remoteBuild: true) so the data/
# folder and DEMO_CSV_PATH baked into the Containerfile end up in the running image.
#
# The sandbox worker image (remote_worker.py) is built and pushed to ACR by the predeploy
# hook; DTS starts it on demand, so it is not an azd service.

metadata:
  template: dts-ondemand-sandboxes-python-aca
name: dts-ondemand-sandboxes-python
hooks:
  predeploy:
    shell: sh
    run: ./scripts/acr-build.sh
  postprovision:
    shell: sh
    run: ./scripts/attach-scheduler-identity.sh
services:
  mainapp:
    project: .
    language: python
    host: containerapp
    docker:
      # Paths are relative to the service project (the python/ sample root), which is also
      # the build context so requirements.txt and data/ are available to the build.
      path: ./Containerfile.mainapp
      context: .
      platform: linux/amd64
      remoteBuild: true
