# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# On-demand Sandboxes (.NET) on Azure Container Apps.
#
# Only the orchestrator (main-app) is deployed to Azure Container Apps. The sandbox worker
# image is built and pushed to ACR by the predeploy hook; DTS starts it on demand, so it
# is not an azd service. Images are built server-side with ACR Tasks (az acr build) to
# avoid local Docker builds (the Grpc.Tools arm64 protoc segfaults on Apple Silicon).

metadata:
  template: dts-ondemand-sandboxes-dotnet-aca
name: dts-ondemand-sandboxes-dotnet
hooks:
  predeploy:
    shell: sh
    run: ./scripts/acr-build.sh
  postprovision:
    shell: sh
    run: ./scripts/attach-scheduler-identity.sh
services:
  mainapp:
    project: ./main-app
    language: csharp
    host: containerapp
