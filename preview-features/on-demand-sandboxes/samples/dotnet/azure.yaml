# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# On-demand Sandboxes (.NET) on Azure Container Apps.
#
# Only the orchestrator (main-app) is deployed to Azure Container Apps. azd builds its
# image from main-app/Containerfile via a remote ACR build (remoteBuild: true) so the
# data/ folder and DEMO_CSV_PATH baked into the Containerfile end up in the running image,
# and so the Grpc.Tools arm64 protoc segfault on Apple Silicon is avoided (ACR builds amd64).
#
# The sandbox worker image is built and pushed to ACR by the predeploy hook; DTS starts it
# on demand, so it is not an azd service.

metadata:
  template: dts-ondemand-sandboxes-dotnet-aca
name: dts-ondemand-sandboxes-dotnet
hooks:
  predeploy:
    shell: sh
    run: ./scripts/acr-build.sh
  postprovision:
    shell: sh
    run: ./scripts/attach-scheduler-identity.sh
services:
  mainapp:
    project: ./main-app
    language: csharp
    host: containerapp
    docker:
      # Paths are relative to the service project (./main-app). The build context is the
      # .NET sample root so Directory.Build.props and data/ are available to the build.
      path: ./Containerfile
      context: ../
      platform: linux/amd64
      remoteBuild: true
